spring:
  datasource:
    url: "jdbc:mysql://127.0.0.1:${MDOP_MYSQL_PORT}/${MDOP_MYSQL_DATABASE}"
    username: "${MDOP_MYSQL_USER}"
    password: "${MDOP_MYSQL_PASSWORD}"

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/system
      - classpath:db/migration/masterdata
      - classpath:db/migration/wms
      - classpath:db/migration/integration
    encoding: UTF-8
    validate-on-migrate: true
    validate-migration-naming: true
    fail-on-missing-locations: true
    clean-disabled: true
    baseline-on-migrate: false
    out-of-order: false

logging:
  level:
    io.github.acczff.mdop: DEBUG

management:
  endpoint:
    health:
      show-details: always
